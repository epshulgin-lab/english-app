<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="English Learning App — бизнес-словарь, трекер прогресса, карточки, speaking темы и грамматика." />
  <title>English Learning App v3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#dbe3ef;
      --line-hover:#c3cfe4;
      --primary:#3b5bdb;
      --primary-dark:#2f4ac4;
      --primary-soft:#eef2ff;
      --primary-text:#3730a3;
      --green:#059669;
      --green-soft:#ecfdf5;
      --amber:#d97706;
      --red:#dc2626;
      --shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05);
      --shadow-lg:0 4px 6px rgba(0,0,0,.04),0 20px 40px rgba(0,0,0,.07);
      --shadow-sm:0 1px 2px rgba(0,0,0,.05);
      --radius:16px;
      --radius-sm:12px;
      --radius-xs:8px;
    }

    [data-theme="dark"]{
      --bg:#0f1117;
      --card:#1a1d27;
      --text:#f1f5f9;
      --muted:#94a3b8;
      --line:#2d3148;
      --line-hover:#3d4266;
      --primary:#6272ea;
      --primary-dark:#4f5fd4;
      --primary-soft:#1e2240;
      --primary-text:#a5b4fc;
      --green:#34d399;
      --green-soft:#0d2e22;
      --amber:#fbbf24;
      --red:#f87171;
      --shadow:0 1px 3px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.25);
      --shadow-lg:0 4px 6px rgba(0,0,0,.25),0 20px 40px rgba(0,0,0,.35);
      --shadow-sm:0 1px 2px rgba(0,0,0,.2);
    }
    [data-theme="dark"] input,[data-theme="dark"] textarea,[data-theme="dark"] select{
      background:var(--card);color:var(--text);border-color:var(--line);
    }
    [data-theme="dark"] .word-card,[data-theme="dark"] .item-card,[data-theme="dark"] .resource-card{background:var(--card)}
    [data-theme="dark"] .review-card{background:linear-gradient(180deg,#1a1d27,#141720)}
    [data-theme="dark"] .rule-block{background:var(--card)}
    [data-theme="dark"] .rule-example{background:#0d1120;border-color:#2d3148}
    [data-theme="dark"] .rule-formula{background:#1a1d27;border-color:#2d3148;color:var(--text)}
    [data-theme="dark"] .btn.secondary{background:var(--card);color:var(--text)}
    [data-theme="dark"] .btn.soft{background:var(--primary-soft);color:var(--primary-text)}
    [data-theme="dark"] .notice{background:var(--primary-soft);border-color:#3d4266;color:var(--primary-text)}
    [data-theme="dark"] .grammar-nav-item.active{background:var(--primary-soft);color:var(--primary-text)}
    [data-theme="dark"] .verb-table th{background:#141720}
    [data-theme="dark"] .verb-table td,[data-theme="dark"] .verb-table th{border-color:var(--line)}
    [data-theme="dark"] .verb-table tr:hover td{background:#1e2240}
    [data-theme="dark"] .mini-box{background:var(--card)}
    [data-theme="dark"] .answer-box{background:#1e2240}
    [data-theme="dark"] .theme-toggle{color:#fff}
    .theme-toggle{
      background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
      color:#fff;border-radius:var(--radius-xs);padding:7px 14px;
      cursor:pointer;font:inherit;font-size:13px;font-weight:700;
      backdrop-filter:blur(8px);transition:all .15s ease;
    }
    .theme-toggle:hover{background:rgba(255,255,255,.25)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      line-height:1.55;
      -webkit-font-smoothing:antialiased;
    }
    .container{max-width:1280px;margin:0 auto;padding:20px}
    .hero{
      background:linear-gradient(135deg,#3b5bdb 0%,#6741d9 50%,#ae3ec9 100%);
      border-radius:var(--radius);
      padding:28px 32px;
      margin-bottom:20px;
      color:#fff;
      position:relative;
      overflow:hidden;
      box-shadow:0 4px 24px rgba(59,91,219,.25);
    }
    .hero::before{
      content:"";position:absolute;top:-40%;right:-10%;
      width:400px;height:400px;
      background:radial-gradient(circle,rgba(255,255,255,.12),transparent 70%);
      pointer-events:none;
    }
    .hero::after{
      content:"";position:absolute;bottom:-30%;left:-5%;
      width:300px;height:300px;
      background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%);
      pointer-events:none;
    }
    .hero *{position:relative;z-index:1}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
      transition:box-shadow .2s ease,border-color .2s ease;
    }
    .card:hover{box-shadow:var(--shadow-lg);border-color:var(--line-hover)}
    h1{margin:0 0 8px;font-size:clamp(24px,3vw,34px);font-weight:900;line-height:1.15;letter-spacing:-.025em}
    h2,h3{margin:0;letter-spacing:-.02em}
    .hero-muted{color:rgba(255,255,255,.85);font-size:14px;line-height:1.6}
    .badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .badge{
      display:inline-flex;align-items:center;gap:5px;padding:5px 12px;
      border-radius:999px;font-size:12px;font-weight:700;
      background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);
      color:#fff;backdrop-filter:blur(8px);
    }
    .tabs{
      display:flex;gap:4px;flex-wrap:wrap;
      margin:0 0 20px;align-items:center;
      background:var(--card);padding:6px;
      border-radius:var(--radius);border:1px solid var(--line);
      box-shadow:var(--shadow-sm);
    }
    .tab{
      border:none;background:transparent;border-radius:var(--radius-sm);
      padding:9px 16px;cursor:pointer;font-weight:700;font-size:13px;
      color:var(--muted);transition:all .18s ease;font-family:inherit;
    }
    .tab:hover{background:var(--bg);color:var(--text)}
    .tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(59,91,219,.3)}
    .tab-pane{display:none}
    .tab-pane.active{display:block;animation:fadeSlide .22s ease}
    .dashboard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .grid-2{display:grid;grid-template-columns:1fr 1.4fr;gap:16px}
    .grid-2-equal{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .metric .label{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
    .metric .value{font-size:34px;font-weight:900;margin:10px 0 4px;letter-spacing:-.02em}
    .progress{height:8px;background:var(--bg);border-radius:999px;overflow:hidden;margin-top:10px}
    .bar{height:100%;background:linear-gradient(90deg,var(--primary),#6741d9);border-radius:999px;transition:width .4s ease}
    label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
    input,textarea,select{
      width:100%;padding:10px 13px;
      border-radius:var(--radius-xs);border:1.5px solid var(--line);
      background:var(--card);font:inherit;font-size:14px;
      color:var(--text);transition:border-color .15s ease,box-shadow .15s ease;
    }
    input:focus,textarea:focus,select:focus{
      outline:none;border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(59,91,219,.12);
    }
    textarea{min-height:88px;resize:vertical}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:6px;
      border:none;background:var(--primary);color:#fff;font-weight:700;font-size:14px;
      padding:10px 18px;border-radius:var(--radius-xs);cursor:pointer;
      transition:all .15s ease;box-shadow:0 1px 3px rgba(59,91,219,.2);
      font-family:inherit;
    }
    .btn:hover{background:var(--primary-dark);box-shadow:0 4px 12px rgba(59,91,219,.25);transform:translateY(-1px)}
    .btn:active{transform:translateY(0)}
    .btn.secondary{
      background:var(--card);color:var(--text);border:1.5px solid var(--line);
      box-shadow:var(--shadow-sm);
    }
    .btn.secondary:hover{background:var(--bg);border-color:var(--line-hover)}
    .btn.soft{background:var(--primary-soft);color:var(--primary-text);box-shadow:none}
    .btn.soft:hover{background:#e0e7ff}
    .btn.small{padding:6px 12px;font-size:12px;border-radius:var(--radius-xs)}
    .btn.danger{background:#fef2f2;color:#dc2626;border:1.5px solid #fecaca;box-shadow:none}
    .btn.danger:hover{background:#fee2e2;border-color:#fca5a5}
    .section-title{margin:0 0 16px;font-size:17px;font-weight:800;letter-spacing:-.015em}
    .list{display:flex;flex-direction:column;gap:10px}
    .word-card,.item-card,.resource-card{
      border:1px solid var(--line);border-radius:var(--radius-sm);
      padding:15px;background:var(--card);transition:all .15s ease;
    }
    .item-card:hover,.word-card:hover,.resource-card:hover{border-color:var(--line-hover);box-shadow:var(--shadow)}
    .word-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .word-title{font-size:18px;font-weight:800;letter-spacing:-.01em}
    .status-new{background:var(--text);color:#fff;border-color:var(--text)}
    .status-learning{background:#eff6ff;color:#2563eb;border-color:#bfdbfe}
    .status-known{background:#ecfdf5;color:#059669;border-color:#a7f3d0}
    .small-muted{font-size:13px;color:var(--muted)}
    .button-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip,.pill{
      display:inline-flex;align-items:center;gap:4px;padding:4px 10px;
      border-radius:999px;font-size:12px;font-weight:600;
      border:1px solid var(--line);background:var(--bg);color:var(--muted);
    }
    .phonetics{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .filters{display:flex;gap:8px;flex-wrap:wrap}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .review-card{
      min-height:300px;display:flex;flex-direction:column;justify-content:space-between;
      border:1.5px solid var(--line);border-radius:var(--radius);
      padding:26px;background:linear-gradient(180deg,#fff,#fafafe);
      box-shadow:var(--shadow);
    }
    .flash-word{
      font-size:36px;font-weight:900;margin:14px 0 6px;letter-spacing:-.02em;
      background:linear-gradient(135deg,var(--primary),#6741d9);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .mini-box{
      padding:14px;border:1px solid var(--line);border-radius:var(--radius-sm);
      background:var(--card);font-size:12px;font-weight:600;
      color:var(--muted);text-transform:uppercase;letter-spacing:.03em;
    }
    .mini-box strong{display:block;font-size:24px;margin-top:6px;color:var(--text);letter-spacing:-.02em;font-weight:900}
    a.resource-card{text-decoration:none;color:inherit;display:block}
    .topic-text{white-space:pre-line;line-height:1.7;font-size:14px}
    .notice{
      padding:13px 15px;border:1px solid #c7d2fe;background:var(--primary-soft);
      border-radius:var(--radius-sm);font-size:13px;color:var(--primary-text);line-height:1.5;
    }
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .copy-ok{color:var(--green);font-size:12px;margin-left:6px;font-weight:600}

    /* Grammar tab */
    .grammar-grid{display:grid;grid-template-columns:260px 1fr;gap:16px;align-items:start}
    .grammar-nav{display:flex;flex-direction:column;gap:4px}
    .grammar-nav-item{
      padding:10px 14px;border-radius:var(--radius-xs);border:none;background:transparent;
      cursor:pointer;font:inherit;font-size:14px;font-weight:600;color:var(--muted);
      text-align:left;transition:all .15s ease;
    }
    .grammar-nav-item:hover{background:var(--bg);color:var(--text)}
    .grammar-nav-item.active{background:var(--primary-soft);color:var(--primary-text)}
    .grammar-nav-category{
      font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;
      letter-spacing:.06em;padding:12px 14px 4px;
    }
    .grammar-content{display:none}
    .grammar-content.active{display:block;animation:fadeSlide .2s ease}
    .rule-block{
      border:1px solid var(--line);border-radius:var(--radius-sm);
      padding:18px;background:var(--card);margin-bottom:12px;
    }
    .rule-block h4{font-size:15px;font-weight:800;margin-bottom:10px;letter-spacing:-.01em}
    .rule-block p{font-size:14px;line-height:1.7;color:#374151;margin-bottom:10px}
    .rule-block p:last-child{margin-bottom:0}
    .rule-example{
      background:#f8faff;border:1px solid #dbe8ff;border-radius:var(--radius-xs);
      padding:10px 14px;font-size:14px;margin-top:8px;line-height:1.6;
    }
    .rule-example em{color:var(--primary);font-style:normal;font-weight:700}
    .rule-formula{
      background:#fafafa;border:1px solid var(--line);border-radius:var(--radius-xs);
      padding:10px 14px;font-size:13px;font-weight:700;color:#374151;
      font-family:'Courier New',monospace;margin:8px 0;letter-spacing:.01em;
    }
    .video-link{
      display:inline-flex;align-items:center;gap:8px;margin-top:14px;
      padding:9px 16px;border-radius:var(--radius-xs);background:#fee2e2;
      color:#991b1b;font-weight:700;font-size:13px;text-decoration:none;
      border:1px solid #fecaca;transition:all .15s ease;
    }
    .video-link:hover{background:#fecaca;border-color:#fca5a5}

    /* Irregular verbs table */
    .verb-search{margin-bottom:14px}
    .verb-table{width:100%;border-collapse:collapse;font-size:13px}
    .verb-table th{
      background:var(--bg);border:1px solid var(--line);
      padding:10px 12px;font-weight:700;font-size:12px;
      color:var(--muted);text-transform:uppercase;letter-spacing:.04em;
      text-align:left;
    }
    .verb-table td{
      border:1px solid var(--line);padding:9px 12px;
      transition:background .1s ease;
    }
    .verb-table tr:hover td{background:#f8fbff}
    .verb-table .v1{font-weight:700;color:var(--text)}
    .verb-table .v2{color:#2563eb;font-weight:600}
    .verb-table .v3{color:#059669;font-weight:600}
    .verb-table .vtrans{color:var(--muted)}
    .verb-group-header td{
      background:var(--primary-soft);color:var(--primary-text);
      font-weight:800;font-size:12px;letter-spacing:.04em;text-transform:uppercase;
    }
    .table-wrapper{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--line)}

    @keyframes fadeSlide{
      from{opacity:0;transform:translateY(5px)}
      to{opacity:1;transform:translateY(0)}
    }
    @media(max-width:980px){
      .container{padding:12px}
      .dashboard-grid,.grid-3,.kpis,.two-col{grid-template-columns:1fr}
      .grid-2,.grid-2-equal{grid-template-columns:1fr}
      h1{font-size:24px}
      .tabs{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none}
      .tabs::-webkit-scrollbar{display:none}
      .tab{padding:8px 13px;white-space:nowrap}
      .grammar-grid{grid-template-columns:1fr}
      .grammar-nav{flex-direction:row;flex-wrap:wrap}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation:none !important;transition:none !important}
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div style="display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap">
        <div>
          <h1>English Learning System</h1>
          <div class="hero-muted">Дашборд, трекер прогресса, бизнес-словарь с озвучкой, грамматика, неправильные глаголы, темы для speaking и экспорт данных.</div>
        </div>
        <div class="badges">
          <span class="badge">B1 → B2</span>
          <span class="badge">60 мин/день</span>
          <span class="badge">Business English</span>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙 Тёмная</button>
      </div>
    </section>

    <div class="tabs" id="tabs"></div>

    <section id="dashboard" class="tab-pane active"></section>
    <section id="tracker" class="tab-pane"></section>
    <section id="dictionary" class="tab-pane"></section>
    <section id="review" class="tab-pane"></section>
    <section id="quiz" class="tab-pane"></section>
    <section id="topics" class="tab-pane"></section>
    <section id="grammar" class="tab-pane"></section>
    <section id="resources" class="tab-pane"></section>
  </div>

<script>
const STORAGE_KEYS = {
  settings: 'eng_plus_settings_v3',
  tracker:  'eng_plus_tracker_v3',
  dictionary:'eng_plus_dictionary_v3',
  topics:   'eng_plus_topics_v3',
};

const defaultSettings = {
  weeklyWordsGoal: 70,
  weeklySpeakingGoal: 120,
  weeklyListeningGoal: 5,
};

const starterWords = [
  { word:"schedule", translation:"расписание; планировать", phonetic:"/ˈskedʒuːl/", pronounce:"скэ́джул", example:"Let's schedule a meeting for tomorrow.", exampleTranslation:"Давай запланируем встречу на завтра.", category:"Работа", source:"базовый", status:"новое", reviewToday:false },
  { word:"deadline", translation:"крайний срок", phonetic:"/ˈdedlaɪn/", pronounce:"де́длайн", example:"We need to meet the deadline.", exampleTranslation:"Нам нужно уложиться в крайний срок.", category:"Работа", source:"базовый", status:"новое", reviewToday:false },
  { word:"follow up", translation:"уточнить позже; вернуться к вопросу", phonetic:"/ˈfɑːloʊ ʌp/", pronounce:"фа́лоу ап", example:"I will follow up by email.", exampleTranslation:"Я уточню это позже по электронной почте.", category:"Работа", source:"базовый", status:"новое", reviewToday:false },
  { word:"issue", translation:"вопрос; проблема", phonetic:"/ˈɪʃuː/", pronounce:"и́шью", example:"There is an issue with the shipment.", exampleTranslation:"С отгрузкой возникла проблема.", category:"Бизнес", source:"базовый", status:"новое", reviewToday:false },
  { word:"shipment", translation:"отгрузка", phonetic:"/ˈʃɪpmənt/", pronounce:"ши́пмэнт", example:"The shipment will arrive next week.", exampleTranslation:"Отгрузка прибудет на следующей неделе.", category:"Бизнес", source:"базовый", status:"новое", reviewToday:false },
  { word:"supplier", translation:"поставщик", phonetic:"/səˈplaɪər/", pronounce:"сэпа́йер", example:"We are looking for a reliable supplier.", exampleTranslation:"Мы ищем надёжного поставщика.", category:"Бизнес", source:"базовый", status:"новое", reviewToday:false },
  { word:"customer", translation:"клиент", phonetic:"/ˈkʌstəmər/", pronounce:"ка́стэмер", example:"The customer requested a discount.", exampleTranslation:"Клиент запросил скидку.", category:"Бизнес", source:"базовый", status:"новое", reviewToday:false },
  { word:"agreement", translation:"соглашение", phonetic:"/əˈɡriːmənt/", pronounce:"эгри́мэнт", example:"We signed the agreement yesterday.", exampleTranslation:"Мы подписали соглашение вчера.", category:"Бизнес", source:"базовый", status:"новое", reviewToday:false },
  { word:"negotiate", translation:"вести переговоры", phonetic:"/nɪˈɡoʊʃieɪt/", pronounce:"ниго́ушиэйт", example:"We need to negotiate the price.", exampleTranslation:"Нам нужно обсудить цену на переговорах.", category:"Переговоры", source:"базовый", status:"новое", reviewToday:false },
  { word:"clarify", translation:"уточнять", phonetic:"/ˈklærəfaɪ/", pronounce:"клэ́рифай", example:"Could you clarify this point?", exampleTranslation:"Не могли бы вы уточнить этот момент?", category:"Переговоры", source:"базовый", status:"новое", reviewToday:false },
  { word:"quotation", translation:"коммерческое предложение; котировка", phonetic:"/kwoʊˈteɪʃn/", pronounce:"квоутэ́йшн", example:"Please send us your quotation by Friday.", exampleTranslation:"Пожалуйста, отправьте нам своё коммерческое предложение до пятницы.", category:"Бизнес-словарь", source:"business", status:"новое", reviewToday:false },
  { word:"purchase order", translation:"заказ на покупку", phonetic:"/ˈpɜːrtʃəs ˌɔːrdər/", pronounce:"пёрчэс о́рдэр", example:"We received your purchase order this morning.", exampleTranslation:"Мы получили ваш заказ на покупку сегодня утром.", category:"Бизнес-словарь", source:"business", status:"новое", reviewToday:false },

// ─── Helpers ─────────────────────────────────────────────────
function todayISO(){ return new Date().toISOString().slice(0,10); }
function load(key, fallback){
  try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }catch(e){ return fallback; }
}
function save(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
function normalizeDictionary(arr){
  return arr.map(x => ({
    status:'новое', reviewToday:false, addedAt:todayISO(),
    phonetic:'', pronounce:'', example:'', exampleTranslation:'',
    // SRS fields
    srsInterval:1, srsEaseFactor:2.5, srsRepetitions:0, srsDueDate:todayISO(),
    ...x
  }));
}
function normalizeTopics(arr){
  return arr.map(x => typeof x === 'string' ? { title:x, text:'', translation:'' } : { title:'', text:'', translation:'', ...x });
}
function weekNumber(dateString){
  const date = new Date(dateString);
  const first = new Date(date.getFullYear(),0,1);
  const past = Math.floor((date - first)/86400000);
  return Math.ceil((past + first.getDay() + 1)/7);
}
function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function percent(a,b){ return Math.min(100, Math.round((a / Math.max(1,b))*100)); }
function safeJson(s){ return esc(JSON.stringify(s)); }

// ─── SRS (SM-2) ──────────────────────────────────────────────
function srsNextDate(days){ const d = new Date(); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); }
function applySRS(item, quality){
  // quality: 0=забыл, 1=трудно, 2=хорошо, 3=легко
  let { srsInterval=1, srsEaseFactor=2.5, srsRepetitions=0 } = item;
  if(quality === 0){
    srsRepetitions = 0; srsInterval = 1;
  } else {
    if(srsRepetitions === 0) srsInterval = 1;
    else if(srsRepetitions === 1) srsInterval = 3;
    else srsInterval = Math.round(srsInterval * srsEaseFactor);
    srsRepetitions += 1;
    srsEaseFactor = Math.max(1.3, srsEaseFactor + 0.1 - (3-quality)*(0.08+(3-quality)*0.02));
  }
  const srsDueDate = srsNextDate(srsInterval);
  const status = quality === 0 ? 'новое' : quality === 1 ? 'учу' : 'знаю';
  return { ...item, srsInterval, srsEaseFactor, srsRepetitions, srsDueDate, status };
}
function srsDueToday(){ return state.dictionary.filter(w => !w.srsDueDate || w.srsDueDate <= todayISO()); }
function streakCount(){
  if(!state.tracker.length) return 0;
  const dates = [...new Set(state.tracker.map(x=>x.date))].sort((a,b)=>b.localeCompare(a));
  let streak=0; let expected=todayISO();
  for(const d of dates){
    if(d===expected){ streak++; const dt=new Date(expected); dt.setDate(dt.getDate()-1); expected=dt.toISOString().slice(0,10); }
    else if(d<expected) break;
  }
  return streak;
}

function getBestVoice(){
  if(!('speechSynthesis' in window)) return null;
  const voices = window.speechSynthesis.getVoices() || [];
  return voices.find(v => /en[-_]?US/i.test(v.lang)) || voices.find(v => /^en/i.test(v.lang)) || voices[0] || null;
}
if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = () => {}; }

function speakText(text){
  if(!text) return;
  if(!('speechSynthesis' in window)){ alert('В этом браузере озвучка не поддерживается.'); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.9;
  const v = getBestVoice(); if(v) u.voice = v;
  try{ window.speechSynthesis.cancel(); window.speechSynthesis.speak(u); }
  catch(e){ alert('Не удалось запустить озвучку.'); }
}
function copyText(text){
  navigator.clipboard.writeText(text).then(() => {
    state.copied = text.slice(0,40);
    renderTopics();
    setTimeout(() => { state.copied = ''; renderTopics(); }, 1400);
  }).catch(() => {});
}
function persist(){
  save(STORAGE_KEYS.settings, state.settings);
  save(STORAGE_KEYS.tracker, state.tracker);
  save(STORAGE_KEYS.dictionary, state.dictionary);
  save(STORAGE_KEYS.topics, state.topics);
}
function exportData(){
  const blob = new Blob([JSON.stringify({ settings:state.settings, tracker:state.tracker, dictionary:state.dictionary, topics:state.topics }, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'english-learning-backup.json'; a.click();
  URL.revokeObjectURL(url);
}
function importData(input){
  const file = input.files && input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const data = JSON.parse(reader.result);
      state.settings = data.settings || defaultSettings;
      state.tracker = data.tracker || [];
      state.dictionary = normalizeDictionary(data.dictionary || starterWords);
      state.topics = normalizeTopics(data.topics || defaultTopics);
      persist(); renderAll(); alert('Данные успешно импортированы.');
    }catch(e){ alert('Не удалось импортировать файл.'); }
  };
  reader.readAsText(file);
}

function dictionaryCategories(){ return ['все',...Array.from(new Set(state.dictionary.map(x=>x.category)))]; }
function filteredDictionary(){
  const q = state.search.trim().toLowerCase();
  return state.dictionary.filter(item => {
    const s = [item.word,item.translation,item.example,item.exampleTranslation,item.category,item.status,item.phonetic,item.pronounce].join(' ').toLowerCase();
    return (!q||s.includes(q)) && (state.statusFilter==='все'||item.status===state.statusFilter) && (state.categoryFilter==='все'||item.category===state.categoryFilter);
  });
}
function parseKey(key){ const [word,translation,category,example] = decodeURIComponent(key).split('|'); return {word,translation,category,example}; }
function wordCard(item){

function setNewWordStatus(status){ state.newWord.status = status; renderDictionary(); }

function removeWord(key){

function updateWordStatus(key, status){
  const t = parseKey(key);
  state.dictionary = state.dictionary.map(item => (item.word===t.word && item.translation===t.translation && item.category===t.category && (item.example||'')===t.example) ? {...item, status} : item);
  persist(); renderDictionary(); renderDashboard(); renderReview();

function toggleReview(key){
  const t = parseKey(key);
  state.dictionary = state.dictionary.map(item => (item.word===t.word && item.translation===t.translation && item.category===t.category && (item.example||'')===t.example) ? {...item, reviewToday:!item.reviewToday} : item);
  persist(); renderDictionary(); renderDashboard(); renderReview();
}

              <div style="text-align:center"><div style="font-size:20px;font-weight:900;color:#2563eb">${state.dictionary.filter(x=>x.status==='учу').length}</div><div class="small-muted" style="font-size:11px">Учу</div></div>
              <div style="text-align:center"><div style="font-size:20px;font-weight:900;color:#059669">${state.dictionary.filter(x=>x.status==='знаю').length}</div><div class="small-muted" style="font-size:11px">Знаю</div></div>
            </div>

      </div>
    </div>`;
}
function toggleAnswer(){ state.showAnswer = !state.showAnswer; renderReview(); }
function nextReview(){ state.showAnswer = false; state.flashIndex += 1; renderReview(); }
function srsAnswer(quality){
  const w = currentReviewWord(); if(!w) return;
  const updated = applySRS(w, quality);
  state.dictionary = state.dictionary.map(item =>
    item.word===w.word && item.translation===w.translation && item.category===w.category && (item.example||'')===(w.example||'')
      ? updated : item
  );
  persist();
  state.showAnswer = false;
  // Remove answered word from current session by advancing index
  const remaining = wordsForReview(); // recalculated after update
  if(remaining.length === 0) state.flashIndex = 0;
  else state.flashIndex = state.flashIndex % Math.max(1, remaining.length);
  renderReview(); renderDictionary(); renderDashboard();
}
function markReviewStatus(status){
  const quality = status==='знаю'?3:status==='учу'?1:0;
  srsAnswer(quality);
}

// ─── Quiz ─────────────────────────────────────────────────────
function quizCategories(){ return ['все',...Array.from(new Set(state.dictionary.map(x=>x.category)))]; }
function quizPool(){
  const cat = state.quiz.categoryFilter;
  const pool = cat==='все' ? state.dictionary : state.dictionary.filter(w=>w.category===cat);
  return pool.filter(w=>w.word && w.translation);
}
function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }
function generateQuizQuestion(){
  const pool = quizPool();
  if(pool.length < 4){ state.quiz.current = null; state.quiz.options = []; return; }
  const correct = pool[Math.floor(Math.random()*pool.length)];
  const wrong = shuffle(pool.filter(w=>w.word!==correct.word)).slice(0,3);
  const options = shuffle([correct,...wrong]);
  state.quiz.current = correct;
  state.quiz.options = options;
  state.quiz.answered = null;
}
function quizAnswer(word){
  if(state.quiz.answered !== null) return;
  state.quiz.answered = word;
  state.quiz.total++;
  if(word === state.quiz.current.word) state.quiz.score++;
  renderQuiz();
}
function quizNext(){
  generateQuizQuestion();
  renderQuiz();
}
function quizReset(){
  state.quiz.score = 0;
  state.quiz.total = 0;
  generateQuizQuestion();
  renderQuiz();
}
function setQuizCategory(v){
  state.quiz.categoryFilter = v;
  state.quiz.score = 0;
  state.quiz.total = 0;
  generateQuizQuestion();
  renderQuiz();
}
function setQuizMode(v){
  state.quiz.mode = v;
  state.quiz.score = 0;
  state.quiz.total = 0;
  generateQuizQuestion();
  renderQuiz();
}
function renderQuiz(){
  const q = state.quiz;
  const pool = quizPool();
  const acc = q.total > 0 ? Math.round((q.score/q.total)*100) : 0;

  if(!q.current){
    generateQuizQuestion();
  }
  const w = q.current;

  // Determine what to show as the question and what to show as options
  // mode 'translation': show English word → choose Russian translation
  // mode 'word': show Russian translation → choose English word
  const showQuestion = q.mode === 'translation'
    ? (w ? esc(w.word) : '')
    : (w ? esc(w.translation) : '');

  const optionLabel = (opt) => q.mode === 'translation'
    ? esc(opt.translation.split(';')[0].trim())
    : esc(opt.word);

  const optionKey = (opt) => opt.word;

  document.getElementById('quiz').innerHTML = `
    <div class="grid-2" style="grid-template-columns:1.3fr 1fr">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px">
          <h3 class="section-title" style="margin:0">Тест: выбери правильный ответ</h3>
          <div class="chips">
            <span class="chip" style="background:#ecfdf5;border-color:#a7f3d0;color:#065f46;font-weight:700">${q.score}/${q.total}</span>
            ${q.total>0?`<span class="chip" style="${acc>=70?'background:#ecfdf5;border-color:#a7f3d0;color:#065f46':'background:#fef2f2;border-color:#fecaca;color:#dc2626'}">${acc}%</span>`:''}
          </div>
        </div>

        <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
          <select onchange="setQuizCategory(this.value)" style="flex:1;min-width:140px">
            ${quizCategories().map(c=>`<option value="${esc(c)}" ${q.categoryFilter===c?'selected':''}>${c==='все'?'Все категории':esc(c)}</option>`).join('')}
          </select>
          <div style="display:flex;gap:4px">
            <button class="btn ${q.mode==='translation'?'':'secondary'} small" onclick="setQuizMode('translation')">EN→RU</button>
            <button class="btn ${q.mode==='word'?'':'secondary'} small" onclick="setQuizMode('word')">RU→EN</button>
          </div>
        </div>

        ${pool.length < 4 ? `
          <div class="notice">В выбранной категории меньше 4 слов. Выбери другую категорию или добавь слова в словарь.</div>
        ` : !w ? '' : `
          <div style="text-align:center;padding:24px 16px 28px;background:var(--primary-soft);border-radius:var(--radius-sm);margin-bottom:16px">
            <div class="small-muted" style="margin-bottom:8px">${q.mode==='translation'?'Что означает это слово?':'Как это будет по-английски?'}</div>
            <div style="font-size:32px;font-weight:900;letter-spacing:-.02em;color:var(--primary-text)">${showQuestion}</div>
            ${q.mode==='translation' && w.phonetic?`<div class="small-muted" style="margin-top:6px">${esc(w.phonetic)}</div>`:''}
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            ${q.options.map((opt,i)=>{
              let style = '';
              let extra = '';
              if(q.answered !== null){
                if(optionKey(opt)===w.word){
                  style='background:#ecfdf5;border-color:#059669;border-width:2px';
                  extra='✓ ';
                } else if(optionKey(opt)===q.answered && optionKey(opt)!==w.word){
                  style='background:#fef2f2;border-color:#dc2626;border-width:2px';
                  extra='✗ ';
                }
              }
              return `<button
                onclick="quizAnswer('${esc(optionKey(opt))}')"
                style="padding:14px 10px;border-radius:var(--radius-sm);border:1.5px solid var(--line);background:var(--card);cursor:pointer;font:inherit;font-size:14px;font-weight:600;text-align:left;transition:all .15s;${style}"
              >${extra}${optionLabel(opt)}</button>`;
            }).join('')}
          </div>

          ${q.answered!==null?`
            <div style="margin-top:16px">
              ${q.answered===w.word?`
                <div style="background:#ecfdf5;border:1px solid #a7f3d0;border-radius:var(--radius-sm);padding:12px 14px;color:#065f46;font-weight:700">
                  ✓ Правильно!
                </div>`:`
                <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:var(--radius-sm);padding:12px 14px;color:#991b1b;font-weight:700">
                  ✗ Неверно — правильный ответ: <span style="text-decoration:underline">${q.mode==='translation'?esc(w.translation):esc(w.word)}</span>
                </div>`}
              ${w.example?`<div class="item-card" style="margin-top:10px;font-size:13px">
                <div>${esc(w.example)}</div>
                ${w.exampleTranslation?`<div class="small-muted" style="margin-top:4px">${esc(w.exampleTranslation)}</div>`:''}
                <button class="btn secondary small" style="margin-top:8px" onclick="speakText(${safeJson(w.example)})">🔊 Послушать</button>
              </div>`:''}
              <div class="button-row" style="margin-top:12px">
                <button class="btn" onclick="quizNext()">Следующий вопрос →</button>
                ${q.total>0&&q.total%10===0?`<button class="btn secondary" onclick="quizReset()">Начать заново</button>`:''}
              </div>
            </div>`:''}
        `}
      </div>

      <div class="card">
        <h3 class="section-title">Статистика теста</h3>
        <div class="list">
          <div class="item-card">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
              <div style="text-align:center;padding:12px;background:var(--primary-soft);border-radius:var(--radius-sm)">
                <div style="font-size:28px;font-weight:900;color:var(--primary)">${q.score}</div>
                <div class="small-muted">Правильно</div>
              </div>
              <div style="text-align:center;padding:12px;background:#fef2f2;border-radius:var(--radius-sm)">
                <div style="font-size:28px;font-weight:900;color:#dc2626">${q.total-q.score}</div>
                <div class="small-muted">Ошибки</div>
              </div>
            </div>
            <div style="margin-top:12px">
              <div class="small-muted" style="margin-bottom:6px">Точность</div>
              <div class="progress"><div class="bar" style="width:${acc}%;background:${acc>=70?'linear-gradient(90deg,#059669,#10b981)':'linear-gradient(90deg,#dc2626,#f87171)'}"></div></div>
              <div style="display:flex;justify-content:space-between;margin-top:4px">
                <span class="small-muted">${acc}%</span>
                <span class="small-muted">${q.total} вопросов</span>
              </div>
            </div>
          </div>

          <div class="item-card">
            <strong>Режимы</strong>
            <div class="small-muted" style="margin-top:6px">
              <strong>EN→RU</strong> — видишь английское слово, выбираешь перевод<br>
              <strong>RU→EN</strong> — видишь перевод, выбираешь английское слово
            </div>
          </div>

          <div class="item-card">
            <strong>Совет</strong>
            <div class="small-muted" style="margin-top:6px">Используй тест вместе с карточками SRS — карточки помогают запомнить, тест проверяет знания. Нажимай 🔊 чтобы слышать произношение после каждого вопроса.</div>
          </div>

          <div class="item-card">
            <strong>Слов в базе</strong>
            <div class="small-muted" style="margin-top:6px">${pool.length} слов в выбранной категории · ${state.dictionary.length} всего</div>
            <div class="button-row" style="margin-top:8px">
              <button class="btn secondary small" onclick="quizReset()">Сбросить счёт</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
}

        </div>
      </div>
      <div class="card">
        <h3 class="section-title">Как использовать приложение</h3>
        <div class="list">
          <div class="item-card"><strong>1. Каждый день</strong><div class="small-muted" style="margin-top:6px">Добавляй тренировку в трекер: слова, минуты speaking и аудирование.</div></div>
          <div class="item-card"><strong>2. Словарь</strong><div class="small-muted" style="margin-top:6px">Смотри слово → транскрипция → пример → перевод примера. Контекст помогает запоминать.</div></div>
          <div class="item-card"><strong>3. Повторение</strong><div class="small-muted" style="margin-top:6px">Используй карточки 5–10 минут в день, слушай примеры через озвучку.</div></div>
          <div class="item-card"><strong>4. Speaking</strong><div class="small-muted" style="margin-top:6px">Используй готовые тексты как шаблон, упрощай под свою речь и говори вслух.</div></div>
          <div class="item-card"><strong>5. Грамматика</strong><div class="small-muted" style="margin-top:6px">Изучай правила, смотри видео и возвращайся к таблице неправильных глаголов.</div></div>
          <div class="item-card"><strong>6. Сохраняй прогресс</strong><div class="small-muted" style="margin-top:6px">Раз в неделю экспортируй JSON-резервную копию из дашборда.</div></div>
        </div>
      </div>
    </div>`;
}

// ─── Init ────────────────────────────────────────────────────
function toggleTheme(){
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isDark ? '🌙 Тёмная' : '☀️ Светлая';
  localStorage.setItem('eng_theme', isDark ? 'light' : 'dark');
}
(function(){
  const saved = localStorage.getItem('eng_theme') || 
    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', saved);
  document.addEventListener('DOMContentLoaded', function(){
    const btn = document.getElementById('theme-btn');
    if(btn) btn.textContent = saved === 'dark' ? '☀️ Светлая' : '🌙 Тёмная';
  });
})();

function renderAll(){
  renderTabs();
  renderDashboard();
  renderTracker();
  renderDictionary();
  renderReview();
  generateQuizQuestion();
  renderQuiz();
  renderTopics();
  renderGrammar();
  renderResources();
  const saved = localStorage.getItem('eng_theme') || 'light';
  const btn = document.getElementById('theme-btn');
  if(btn) btn.textContent = saved === 'dark' ? '☀️ Светлая' : '🌙 Тёмная';
}
renderAll();
</script>
